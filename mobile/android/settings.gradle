pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        def localProps = file("local.properties")
        if (localProps.exists()) {
            localProps.withReader("UTF-8") { reader ->
                properties.load(reader)
            }
        }
        def sdkPath = properties.getProperty("flutter.sdk")
        if (sdkPath == null) {
            // CI fallback: subosito/flutter-action@v2 sets FLUTTER_ROOT
            sdkPath = System.getenv("FLUTTER_ROOT") ?: System.getenv("FLUTTER_HOME")
        }
        assert sdkPath != null : "flutter.sdk not set in local.properties and FLUTTER_ROOT env var not set"
        return sdkPath
    }
    includeBuild("${flutterSdkPath}/packages/flutter_tools/gradle")
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application" version "8.1.0" apply false
    id "org.jetbrains.kotlin.android" version "1.9.0" apply false
}

include ":app"
